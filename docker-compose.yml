services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-attendance_api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-attendance_api}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-attendance_api} -d ${POSTGRES_DB:-attendance_api}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-attendance_api}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-attendance_api}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required, must match attendance-auth}
      JWT_ISSUER: ${JWT_ISSUER:-attendance-auth}
      PORT: 4000
      NODE_ENV: production
    ports:
      - "127.0.0.1:${API_PORT:-4000}:4000"
    networks:
      - internal

volumes:
  db_data:

networks:
  internal:
    driver: bridge
